<app-loading-page />
<ng-toast></ng-toast>
<header>
  <div class="header-content">
    <div class="left-section">
      <button *ngIf="!isHome" mat-mini-fab color="primary" class="back-button" (click)="goHome()" title="Voltar para Home">
        <mat-icon>home</mat-icon>
      </button>
    </div>
    
    <div class="logo-section">
      <img src="/background2.jpg" alt="Logo" class="logo">
    </div>

    <div class="right-section">
      <div class="status" (click)="onStatusClick()" title="Clique para sair da sessão">
        <app-status-ws/>
      </div>
    </div>
  </div>
</header>
<router-outlet></router-outlet>
